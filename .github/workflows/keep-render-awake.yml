name: Keep Render Awake

# Render-er free tier 15 minute nishkriyota-r por sleep hoye jay.
# Ei workflow proti 10 minute e Render-er /health endpoint ping kore,
# jate bot kokhono sleep na hoy. workflow_dispatch diye chaile manually
# o run kora jay (jemon push-er por ekbar wake/restart confirm korte).

on:
  schedule:
    - cron: '*/10 * * * *'
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render health endpoint
        run: |
          URL="https://atlasbot-pvp7.onrender.com/health"
          echo "Pinging $URL ..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 25 "$URL" || echo "000")
          echo "Response status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::warning::Render health check returned $STATUS (instance may be sleeping/starting or down)"
          fi
