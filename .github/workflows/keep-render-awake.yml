name: Keep Render Awake (Primary) — Layer 1 (:00 offset)

# Render-er free tier 15 minute nishkriyota-r por sleep hoye jay.
# Ei workflow proti 5 minute e (:00, :05, :10...) Render Primary-er
# /health endpoint ping kore.
#
# v4.3: 3 staggered keep-alive layers (:00 ei file, :02 -2.yml,
# :04 -secondary.yml) — proti 2 minute-e ekta ping jay, tai 15-min
# sleep window kokhonoi miss hobe na ekta-o layer delay/queue hole o.
#
# Render Primary genuinely down thakle watchdog-render-failover.yml
# (proti 5 min) automatically webhook Backup Render-e switch kore dey —
# eta alada, oi system-er complement, replacement na.
#
# Required repo secrets (owner-alert-er jonno, na thakle alert skip hobe):
#   BOT_TOKEN  - Telegram bot token
#   OWNER_ID   - tomar Telegram numeric user id

on:
  schedule:
    - cron: '*/5 * * * *'   # :00, :05, :10...
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render health endpoint
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          OWNER_ID: ${{ secrets.OWNER_ID }}
        run: |
          URL="https://atlasbot-pvp7.onrender.com/health"
          STATUS="000"
          for i in 1 2; do
            echo "Pinging $URL (attempt $i) ..."
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 25 "$URL" || echo "000")
            echo "  -> $STATUS"
            if [ "$STATUS" = "200" ]; then
              break
            fi
            sleep 10
          done

          if [ "$STATUS" != "200" ]; then
            echo "::warning::Render health check returned $STATUS after retries (instance may be sleeping/starting or down)"
            if [ -n "$BOT_TOKEN" ] && [ -n "$OWNER_ID" ]; then
              MSG="⚠️ Render bot DOWN ধরা পড়েছে!%0A%0AStatus code: ${STATUS}%0AURL: ${URL}%0A%0AHF Space ban থাকায় auto-failover নেই — manually চেক করুন Render Dashboard এ।"
              curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
                -d "chat_id=${OWNER_ID}" \
                -d "text=${MSG}" \
                -d "parse_mode=" || true
            else
              echo "::warning::BOT_TOKEN/OWNER_ID secret missing — skipping Telegram alert"
            fi
          fi
