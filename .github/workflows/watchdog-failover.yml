name: Watchdog - Render / HF Space Failover

# ⚠️ TEMPORARILY DISABLED (schedule off): HF Space account banned hoye
# gechhe (2026-06), tai HF fallback target ekhon kaj korbe na. Notun
# HF Space ready hole ABAR 'schedule' uncomment kore active kora jabe.
# ততক্ষণ Render-i shudhu primary, double keep-alive ping (5min + 7min)
# diye sleep prevent kora hocche.
#
# Logic (jokhon abar active kora hobe):
#   1) Render-er /health endpoint hit kore.
#   2) Fail hole (down/sleep-theke-jage-na) -> webhook HF Space-e
#      switch kore (sorasori api.telegram.org-e setWebhook diye,
#      ja GitHub theke kaj kore, kono platform restriction nei).
#   3) Render abar thik thakle -> webhook abar Render-e ferot.
#
# Required repo secrets:
#   BOT_TOKEN     - Telegram bot token
#   RENDER_URL    - e.g. https://atlasbot-pvp7.onrender.com
#   HF_SPACE_URL  - e.g. https://hamzahf2-atlasbot.hf.space (notun space banale update koro)

on:
  # schedule:
  #   - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  watchdog:
    runs-on: ubuntu-latest
    steps:
      - name: Check Render health and switch webhook if needed
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          RENDER_URL: ${{ secrets.RENDER_URL }}
          HF_SPACE_URL: ${{ secrets.HF_SPACE_URL }}
        run: |
          set -e
          if [ -z "$BOT_TOKEN" ] || [ -z "$RENDER_URL" ] || [ -z "$HF_SPACE_URL" ]; then
            echo "::warning::BOT_TOKEN, RENDER_URL, or HF_SPACE_URL secret not set — skipping watchdog"
            exit 0
          fi

          echo "Checking Render health..."
          RENDER_OK="false"
          for i in 1 2 3; do
            RENDER_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 25 "${RENDER_URL%/}/health" || echo "000")
            echo "  attempt $i: /health -> $RENDER_STATUS"
            if [ "$RENDER_STATUS" = "200" ]; then
              RENDER_OK="true"
              break
            fi
            sleep 10
          done
          echo "Render status: ok=$RENDER_OK"

          # Bartoman webhook URL dekhe nei, double-switch ebong unnecessary
          # API call avoid korar jonno.
          CURRENT_WH=$(curl -s --max-time 15 \
            "https://api.telegram.org/bot${BOT_TOKEN}/getWebhookInfo" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('result',{}).get('url',''))" 2>/dev/null || echo "")
          echo "Current webhook: $CURRENT_WH"

          RENDER_TARGET="${RENDER_URL%/}/webhook/${BOT_TOKEN}"
          HF_TARGET="${HF_SPACE_URL%/}/webhook/${BOT_TOKEN}"

          if [ "$RENDER_OK" = "false" ]; then
            if [ "$CURRENT_WH" = "$HF_TARGET" ]; then
              echo "Webhook already on HF Space fallback — nothing to do."
            else
              echo "::warning::Render unreachable — switching webhook to HF Space fallback"
              curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/setWebhook" \
                -H "Content-Type: application/json" \
                -d "{\"url\":\"${HF_TARGET}\",\"drop_pending_updates\":false,\"max_connections\":40}"
            fi
          else
            if [ "$CURRENT_WH" = "$HF_TARGET" ]; then
              echo "Render recovered — switching webhook back from HF Space to Render"
              curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/setWebhook" \
                -H "Content-Type: application/json" \
                -d "{\"url\":\"${RENDER_TARGET}\",\"drop_pending_updates\":false,\"max_connections\":40}"
            elif [ "$CURRENT_WH" = "$RENDER_TARGET" ]; then
              echo "Webhook already on Render — nothing to do."
            else
              echo "::warning::Webhook not pointing to known target — setting to Render"
              curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/setWebhook" \
                -H "Content-Type: application/json" \
                -d "{\"url\":\"${RENDER_TARGET}\",\"drop_pending_updates\":false,\"max_connections\":40}"
            fi
          fi
