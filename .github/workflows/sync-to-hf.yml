name: Sync to HuggingFace Space (DISABLED — HF account banned)

# v4.3: HF account permanently banned (ToS violation). Disabled push
# trigger to avoid wasting Actions minutes on guaranteed-fail pushes.

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git remote add hf https://HamzaHF2:$HF_TOKEN@huggingface.co/spaces/HamzaHF2/AtlasBot
          git push hf main --force
