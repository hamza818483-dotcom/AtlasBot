name: Watchdog - Render Primary/Backup Failover

# Render Primary (atlasbot-pvp7) down/sleeping thakle Telegram webhook
# auto-switch kore Render Backup (atlasbot-3tgq) e — ar Primary fire
# fire korle abar Primary te ferot ane.
#
# Eta bot message handling (webhook) er jonno — Web Quiz API failover
# (worker.js e already ache) er theke alada, kintu duitai mile pura
# system-ke resilient kore.
#
# Required repo secrets:
#   BOT_TOKEN      - Telegram bot token
#   RENDER_URL     - https://atlasbot-pvp7.onrender.com (primary)
#   RENDER_URL_2   - https://atlasbot-3tgq.onrender.com (backup)
#   OWNER_ID       - tomar Telegram numeric user id (alert er jonno)

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  watchdog:
    runs-on: ubuntu-latest
    steps:
      - name: Check Render Primary health and switch webhook if needed
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          RENDER_URL: ${{ secrets.RENDER_URL }}
          RENDER_URL_2: ${{ secrets.RENDER_URL_2 }}
          OWNER_ID: ${{ secrets.OWNER_ID }}
        run: |
          set -e
          if [ -z "$BOT_TOKEN" ] || [ -z "$RENDER_URL" ] || [ -z "$RENDER_URL_2" ]; then
            echo "::warning::BOT_TOKEN, RENDER_URL, or RENDER_URL_2 secret not set — skipping watchdog"
            exit 0
          fi

          PRIMARY="${RENDER_URL%/}"
          BACKUP="${RENDER_URL_2%/}"

          echo "Checking Primary Render health ($PRIMARY)..."
          PRIMARY_OK="false"
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 25 "${PRIMARY}/health" || echo "000")
            echo "  attempt $i: /health -> $STATUS"
            if [ "$STATUS" = "200" ]; then
              PRIMARY_OK="true"
              break
            fi
            sleep 10
          done
          echo "Primary status: ok=$PRIMARY_OK"

          CURRENT_WH=$(curl -s --max-time 15 \
            "https://api.telegram.org/bot${BOT_TOKEN}/getWebhookInfo" \
            | grep -o '"url":"[^"]*"' | sed 's/"url":"//;s/"//' || echo "")
          echo "Current webhook: $CURRENT_WH"

          PRIMARY_TARGET="${PRIMARY}/webhook/${BOT_TOKEN}"
          BACKUP_TARGET="${BACKUP}/webhook/${BOT_TOKEN}"

          if [ "$PRIMARY_OK" = "false" ]; then
            echo "Checking Backup Render health ($BACKUP)..."
            BACKUP_OK="false"
            for i in 1 2; do
              STATUS2=$(curl -s -o /dev/null -w "%{http_code}" --max-time 25 "${BACKUP}/health" || echo "000")
              echo "  attempt $i: /health -> $STATUS2"
              if [ "$STATUS2" = "200" ]; then
                BACKUP_OK="true"
                break
              fi
              sleep 10
            done

            if [ "$BACKUP_OK" = "true" ]; then
              if [ "$CURRENT_WH" = "$BACKUP_TARGET" ]; then
                echo "Webhook already on Backup — nothing to do."
              else
                echo "::warning::Primary down — switching webhook to Backup Render"
                curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/setWebhook" \
                  -H "Content-Type: application/json" \
                  -d "{\"url\":\"${BACKUP_TARGET}\",\"drop_pending_updates\":false,\"max_connections\":40}"
                if [ -n "$BOT_TOKEN" ] && [ -n "$OWNER_ID" ]; then
                  MSG="🔄 Webhook AUTO-SWITCHED to Backup Render!%0A%0APrimary (${PRIMARY}) is down.%0ABot now running on Backup (${BACKUP})."
                  curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
                    -d "chat_id=${OWNER_ID}" -d "text=${MSG}" || true
                fi
              fi
            else
              echo "::warning::Both Primary and Backup are down!"
              if [ -n "$BOT_TOKEN" ] && [ -n "$OWNER_ID" ]; then
                MSG="🚨 CRITICAL: BOTH Render accounts are DOWN!%0A%0APrimary: ${PRIMARY}%0ABackup: ${BACKUP}%0A%0ABot is completely offline — manual check needed NOW."
                curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
                  -d "chat_id=${OWNER_ID}" -d "text=${MSG}" || true
              fi
            fi
          else
            if [ "$CURRENT_WH" = "$BACKUP_TARGET" ]; then
              echo "Primary recovered — switching webhook back from Backup to Primary"
              curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/setWebhook" \
                -H "Content-Type: application/json" \
                -d "{\"url\":\"${PRIMARY_TARGET}\",\"drop_pending_updates\":false,\"max_connections\":40}"
              if [ -n "$BOT_TOKEN" ] && [ -n "$OWNER_ID" ]; then
                MSG="✅ Webhook SWITCHED BACK to Primary Render — Primary is healthy again."
                curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
                  -d "chat_id=${OWNER_ID}" -d "text=${MSG}" || true
              fi
            elif [ "$CURRENT_WH" = "$PRIMARY_TARGET" ]; then
              echo "Webhook already on Primary — nothing to do."
            else
              echo "::warning::Webhook not pointing to known target — setting to Primary"
              curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/setWebhook" \
                -H "Content-Type: application/json" \
                -d "{\"url\":\"${PRIMARY_TARGET}\",\"drop_pending_updates\":false,\"max_connections\":40}"
            fi
          fi
